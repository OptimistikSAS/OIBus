name: Setup environment
description: "Set up Node and install dependencies for Backend, Frontend, and Launcher"
inputs:
  cache_version:
    description: 'Appended to every cache key for manual invalidation — bump the GH_ACTIONS_CACHE_KEY secret to force a clean install across all branches without touching lock files'
    required: true
  prerelease:
    description: 'Is it a prerelease or not'
    required: false
    default: 'false'
  platform_arch:
    description: 'Specific platform/arch for native-module cache isolation (e.g. linux-x64, win-x64)'
    required: true
  tag_name:
    description: 'Tag name used for version bumping'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: backend/package.json

    # ── node_modules caches ─────────────────────────────────────────────────
    # Cache key pattern:  <pkg>-deps-[<platform>-]<cache_version>-<hash(lock)>
    #
    # • hash(package-lock.json) — automatic invalidation: any dependency change
    #   rewrites the lock file, producing a different hash → cache miss → npm ci.
    # • cache_version            — manual escape hatch: bump GH_ACTIONS_CACHE_KEY
    #   in GitHub Secrets to force a clean install (e.g. after cache corruption or
    #   a security advisory) without touching any source file.
    # • platform_arch (backend + launcher only) — native modules (better-sqlite3,
    #   argon2) compile to platform-specific binaries; caches must not be shared
    #   across OSes. Frontend has no native modules → platform-neutral key.

    - name: Cache backend dependencies
      id: cache-backend
      uses: actions/cache@v5
      with:
        path: backend/node_modules
        key: backend-deps-${{ inputs.platform_arch }}-${{ inputs.cache_version }}-${{ hashFiles('backend/package-lock.json') }}

    - name: Cache frontend dependencies
      id: cache-frontend
      uses: actions/cache@v5
      with:
        path: frontend/node_modules
        key: frontend-deps-${{ inputs.cache_version }}-${{ hashFiles('frontend/package-lock.json') }}

    - name: Cache launcher dependencies
      id: cache-launcher
      uses: actions/cache@v5
      with:
        path: launcher/node_modules
        key: launcher-deps-${{ inputs.platform_arch }}-${{ inputs.cache_version }}-${{ hashFiles('launcher/package-lock.json') }}

    # ── Install dependencies (skipped on cache hit) ─────────────────────────

    - name: Install backend dependencies
      if: ${{ steps.cache-backend.outputs.cache-hit != 'true' }}
      working-directory: backend
      shell: bash
      run: npm ci

    - name: Install frontend dependencies
      if: ${{ steps.cache-frontend.outputs.cache-hit != 'true' }}
      working-directory: frontend
      shell: bash
      run: npm ci

    - name: Install launcher dependencies
      if: ${{ steps.cache-launcher.outputs.cache-hit != 'true' }}
      working-directory: launcher
      shell: bash
      run: npm ci

    # ── Version bumping (pre-releases only) ────────────────────────────────

    - name: Bump versions if pre-release
      if: ${{ inputs.prerelease == 'true' }}
      shell: bash
      run: |
        TAG_NAME=${{ inputs.tag_name }}
        echo "Bumping versions to $TAG_NAME"

        bump_version() {
          if [ -d "$1" ]; then
            echo "Bumping $1..."
            cd $1
            jq --arg version "$TAG_NAME" '.version = $version' package.json > tmp.json && mv tmp.json package.json
            cd ..
          fi
        }

        bump_version "backend"
        bump_version "frontend"
        bump_version "launcher"
        bump_version "documentation"
