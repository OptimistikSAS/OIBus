name: Setup environment
description: "Set up Node and install dependencies for Backend, Frontend, and Launcher"
inputs:
  cache_version:
    description: 'Appended to every cache key for manual invalidation — bump the GH_ACTIONS_CACHE_KEY secret to force a clean install across all branches without touching lock files'
    required: true
  prerelease:
    description: 'Is it a prerelease or not'
    required: false
    default: 'false'
  platform_arch:
    description: 'Specific platform/arch for native-module cache isolation (e.g. linux-x64, win-x64)'
    required: true
  tag_name:
    description: 'Tag name used for version bumping'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version-file: backend/package.json

    # ── node_modules caches ─────────────────────────────────────────────────
    # Cache key pattern:  <pkg>-deps-[<platform>-]<cache_version>-<hash(lock)>
    #
    # • hash(package-lock.json) — automatic invalidation: any dependency change
    #   rewrites the lock file, producing a different hash → cache miss → npm ci.
    # • cache_version            — manual escape hatch: bump GH_ACTIONS_CACHE_KEY
    #   in GitHub Secrets to force a clean install (e.g. after cache corruption or
    #   a security advisory) without touching any source file.
    # • platform_arch (all three packages) — backend and launcher have native
    #   modules (better-sqlite3, argon2); frontend has esbuild, which ships a
    #   platform-specific binary as an optional dependency. All three caches
    #   must be isolated by platform.

    # ── pkg-fetch binary cache ───────────────────────────────────────────────
    # @yao-pkg/pkg downloads a prebuilt Node.js base binary from GitHub Releases
    # into ~/.pkg-cache on first use. On slow or restricted CI runners (esp.
    # Windows) this download can time out, causing pkg to fall back to building
    # Node from source (very slow). Caching the directory avoids the download on
    # every run. Key includes platform and the launcher lock-file hash so it
    # invalidates automatically when @yao-pkg/pkg-fetch is upgraded.

    - name: Cache pkg-fetch binaries
      uses: actions/cache@v6
      with:
        path: ~/.pkg-cache
        key: pkg-cache-${{ inputs.platform_arch }}-${{ inputs.cache_version }}-${{ hashFiles('launcher/package-lock.json', 'backend/package-lock.json') }}

    - name: Cache backend dependencies
      id: cache-backend
      uses: actions/cache@v6
      with:
        path: backend/node_modules
        key: backend-deps-${{ inputs.platform_arch }}-${{ inputs.cache_version }}-${{ hashFiles('backend/package-lock.json') }}

    - name: Cache frontend dependencies
      id: cache-frontend
      uses: actions/cache@v6
      with:
        path: frontend/node_modules
        key: frontend-deps-${{ inputs.platform_arch }}-${{ inputs.cache_version }}-${{ hashFiles('frontend/package-lock.json') }}

    - name: Cache launcher dependencies
      id: cache-launcher
      uses: actions/cache@v6
      with:
        path: launcher/node_modules
        key: launcher-deps-${{ inputs.platform_arch }}-${{ inputs.cache_version }}-${{ hashFiles('launcher/package-lock.json') }}

    # ── Install dependencies (skipped on cache hit) ─────────────────────────
    #
    # Native modules (better-sqlite3, argon2) ship prebuilt binaries; we never
    # want npm to compile them from source. Using --ignore-scripts prevents
    # prebuild-install / node-gyp from running automatically on any platform.
    # The explicit rebuild steps below then download the correct prebuilt binary
    # using the --target / --arch / --target_platform flags that the
    # internal:build:lib-* scripts already carry for each platform.

    - name: Install backend dependencies
      if: ${{ steps.cache-backend.outputs.cache-hit != 'true' }}
      working-directory: backend
      shell: bash
      run: npm ci --ignore-scripts

    - name: Rebuild native backend modules
      if: ${{ steps.cache-backend.outputs.cache-hit != 'true' }}
      working-directory: backend
      shell: bash
      run: npm run internal:build:lib-${{ inputs.platform_arch }}

    - name: Install frontend dependencies
      if: ${{ steps.cache-frontend.outputs.cache-hit != 'true' }}
      working-directory: frontend
      shell: bash
      run: npm ci

    - name: Install launcher dependencies
      if: ${{ steps.cache-launcher.outputs.cache-hit != 'true' }}
      working-directory: launcher
      shell: bash
      run: npm ci --ignore-scripts

    - name: Rebuild native launcher modules
      if: ${{ steps.cache-launcher.outputs.cache-hit != 'true' }}
      working-directory: launcher
      shell: bash
      run: npm run internal:build:lib-${{ inputs.platform_arch }}

    # ── Version bumping (pre-releases only) ────────────────────────────────

    - name: Bump versions if pre-release
      if: ${{ inputs.prerelease == 'true' }}
      shell: bash
      run: |
        TAG_NAME=${{ inputs.tag_name }}
        echo "Bumping versions to $TAG_NAME"

        bump_version() {
          if [ -d "$1" ]; then
            echo "Bumping $1..."
            cd $1
            jq --arg version "$TAG_NAME" '.version = $version' package.json > tmp.json && mv tmp.json package.json
            cd ..
          fi
        }

        bump_version "backend"
        bump_version "frontend"
        bump_version "launcher"
        bump_version "documentation"
