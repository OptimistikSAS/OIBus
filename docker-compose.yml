services:
  opcua-server:
    image: mcr.microsoft.com/iotedge/opc-plc:latest
    container_name: oibus_opcua-plc
    hostname: opcua-server
    ports:
      - "50000:50000"
    volumes:
      - ./docker/opcua/nodes_config.json:/app/nodes_config.json
      - ./docker/opcua/pki:/app/pki
    command:
      - --nodesfile=/app/nodes_config.json
      - --autoaccept
      - --disableanonymousauth
      - --adminuser=admin
      - --adminpassword=${OPCUA_ADMIN_PASSWORD:-pass}
      - --defaultuser=oibus
      - --defaultpassword=${OPCUA_DEFAULT_PASSWORD:-pass}
    environment:
      - OPCUA_SERVER_PORT=50000
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "iot" ]

  modbus-server:
    image: oitc/modbus-server
    container_name: oibus_modbus-server
    ports:
      - "5020:5020"
    volumes:
      - ./docker/modbus/server_config.json:/server_config.json
    command: -f /server_config.json
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "iot" ]

  mqtt-broker:
    image: eclipse-mosquitto
    container_name: oibus_mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"  # WebSocket support
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
      - ./docker/mosquitto/entrypoint.sh:/entrypoint.sh
    environment:
      MQTT_USER: oibus
      MQTT_PASSWORD: ${MQTT_PASSWORD:-pass}
    entrypoint: /entrypoint.sh
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "iot" ]

  postgres:
    image: postgres:latest
    container_name: oibus_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: oibus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: oibus-db
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "database" ]

  influxdb:
    image: influxdb:2
    container_name: oibus_influxdb
    ports:
      - "8088:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: oibus
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-oibuspassword}
      DOCKER_INFLUXDB_INIT_ORG: oibus
      DOCKER_INFLUXDB_INIT_BUCKET: oibus-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-oibus-admin-token}
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "database" ]

  oibus:
    image: ghcr.io/optimistiksas/oibus:latest
    container_name: oibus_runtime
    ports:
      - "2223:2223"
    volumes:
      - ./data-folder:/app/OIBus/OIBusData
    networks:
      - oibus-network
    depends_on:
      - opcua-server
    restart: unless-stopped
    profiles: [ "oibus" ]

  nginx:
    image: nginx:latest
    container_name: oibus_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx:/etc/nginx
      - ./docker/nginx/certs:/etc/nginx/certs
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - oibus
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "oibus" ]
    entrypoint: /bin/sh -c "envsubst < /etc/nginx/oibus.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  ftp-server:
    image: fauria/vsftpd
    container_name: oibus_ftp-server
    ports:
      - "20:20"
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: oibus
      FTP_PASS: ${FTP_PASSWORD:-pass}
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    volumes:
      - ./docker/ftp/data:/home/vsftpd
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "ftp" ]

  sftp-server:
    image: atmoz/sftp
    container_name: oibus_sftp-server
    ports:
      - "2222:22"
    command: oibus:${SFTP_PASSWORD:-pass}:::upload
    volumes:
      - ./docker/sftp/data:/home/oibus/upload
    networks:
      - oibus-network
    restart: unless-stopped
    profiles: [ "ftp" ]

  simulator:
    image: python:3.14-slim
    container_name: oibus_simulator
    volumes:
      - ./docker/simulator/simulator.py:/app/simulator.py
    environment:
      MODBUS_HOST: modbus-server
      MODBUS_PORT: 5020
      MODBUS_SLAVE_ID: 1
      MODBUS_UPDATE_INTERVAL: 2
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: 1883
      MQTT_USER: oibus
      MQTT_PASSWORD: ${MQTT_PASSWORD:-pass}
      MQTT_UPDATE_INTERVAL: 2
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-oibus-admin-token}
      INFLUXDB_ORG: oibus
      INFLUXDB_BUCKET: oibus-bucket
      INFLUXDB_UPDATE_INTERVAL: 10
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: oibus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: oibus-db
      POSTGRES_UPDATE_INTERVAL: 10
      RETRY_INTERVAL: 10
    working_dir: /app
    command: >
      sh -c "pip install --quiet paho-mqtt 'pymodbus==3.6.9' influxdb-client psycopg2-binary
      && python -u simulator.py"
    networks:
      - oibus-network
    profiles: [ "simulator" ]

networks:
  oibus-network:
    driver: bridge