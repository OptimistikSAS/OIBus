<div class="modal-header">
  <h4 class="modal-title" [translate]="'south.groups.' + mode + '-title'"></h4>
</div>
@if (form) {
  <div class="modal-body">
    <form [formGroup]="form" (ngSubmit)="save()" id="group-form">
      <!-- Name -->
      <div class="form-group">
        <label class="form-label" for="group-name" translate="south.groups.name"></label>
        <input formControlName="name" id="group-name" class="form-control" />
        <val-errors controlName="name" />
      </div>

      <!-- Scan Mode (Schedule) -->
      <div class="form-group">
        <label for="group-scan-mode" class="form-label" translate="south.items.scan-mode"></label>
        <select class="form-select" id="group-scan-mode" formControlName="scanModeId">
          <option [ngValue]="null" disabled translate="south.items.select-scan-mode"></option>
          @for (scanMode of scanModes; track scanMode.id) {
            <option [value]="scanMode.id">{{ scanMode.name }}</option>
          }
        </select>
        <val-errors controlName="scanModeId" />
      </div>

      <!-- Overlap (only for historian connectors) -->
      @if (hasHistorianCapabilities) {
        <div class="form-group">
          <label class="form-label" for="group-overlap" translate="south.groups.overlap"></label>
          <div class="input-group">
            <input formControlName="overlap" id="group-overlap" type="number" class="form-control" min="0" />
            <span class="input-group-text" translate="common.unit.ms"></span>
          </div>
          <val-errors controlName="overlap" />
        </div>
      }

      <!-- Max Read Interval (only for historian connectors) -->
      @if (hasHistorianCapabilities) {
        <div class="form-group">
          <label class="form-label" for="group-max-read-interval" translate="south.groups.max-read-interval"></label>
          <div class="input-group">
            <input formControlName="maxReadInterval" id="group-max-read-interval" type="number" class="form-control" min="0" />
            <span class="input-group-text" translate="common.unit.s"></span>
          </div>
          <val-errors controlName="maxReadInterval" />
        </div>
      }

      <!-- Read Delay (only for historian connectors) -->
      @if (hasHistorianCapabilities) {
        <div class="form-group">
          <label class="form-label" for="group-read-delay" translate="south.groups.read-delay"></label>
          <div class="input-group">
            <input formControlName="readDelay" id="group-read-delay" type="number" class="form-control" min="0" />
            <span class="input-group-text" translate="common.unit.ms"></span>
          </div>
          <val-errors controlName="readDelay" />
        </div>
      }
    </form>
  </div>
}
<div class="modal-footer">
  <div class="btn-group">
    <button [oib-save-button]="state" form="group-form"></button>
    <button type="button" class="btn btn-cancel" (click)="cancel()" translate="common.cancel" id="cancel-button"></button>
  </div>
</div>
