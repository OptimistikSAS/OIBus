<div class="modal-header">
  <h4 class="modal-title" [translate]="'south.groups.' + mode + '-title'"></h4>
</div>
@if (form) {
  <div class="modal-body">
    <form [formGroup]="form" (ngSubmit)="save()" id="group-form">
      <!-- Name -->
      <div class="form-group">
        <label class="form-label" for="group-name" translate="south.groups.name"></label>
        <input formControlName="name" id="group-name" class="form-control" />
        <val-errors controlName="name" />
      </div>

      <!-- Scan Mode (Schedule) -->
      <div class="form-group">
        <label for="group-scan-mode" class="form-label" translate="south.items.scan-mode"></label>
        <select class="form-select" id="group-scan-mode" formControlName="scanModeId">
          <option [ngValue]="null" disabled translate="south.items.select-scan-mode"></option>
          @for (scanMode of scanModes; track scanMode.id) {
            <option [value]="scanMode.id">{{ scanMode.name }}</option>
          }
        </select>
        <val-errors controlName="scanModeId" />
      </div>

      <!-- Max Read Interval / Read Delay (only for historian connectors) -->
      @if (hasHistorianCapabilities) {
        <div class="row">
          <div class="col-6">
            <div class="form-group">
              <label class="form-label" for="group-max-read-interval" translate="south.groups.max-read-interval"></label>
              <div class="input-group">
                <input formControlName="maxReadInterval" id="group-max-read-interval" type="number" class="form-control" min="0" />
                <span class="input-group-text" translate="common.unit.s"></span>
              </div>
              <val-errors controlName="maxReadInterval" />
            </div>
          </div>
          <div class="col-6">
            <div class="form-group">
              <label class="form-label" for="group-read-delay" translate="south.groups.read-delay"></label>
              <div class="input-group">
                <input formControlName="readDelay" id="group-read-delay" type="number" class="form-control" min="0" />
                <span class="input-group-text" translate="common.unit.ms"></span>
              </div>
              <val-errors controlName="readDelay" />
            </div>
          </div>
        </div>
      }

      <!-- Start Time Offset / End Time Offset (only for historian connectors) -->
      @if (hasHistorianCapabilities) {
        <div class="row">
          <div class="col-6">
            <div class="form-group">
              <label class="form-label" for="group-start-time-offset" translate="south.groups.start-time-offset"></label>
              <div class="input-group">
                <input
                  formControlName="startTimeOffset"
                  id="group-start-time-offset"
                  type="number"
                  class="form-control"
                  min="-2147483648"
                  max="2147483647"
                />
                <span class="input-group-text" translate="common.unit.ms"></span>
              </div>
              <val-errors controlName="startTimeOffset" />
            </div>
          </div>
          <div class="col-6">
            <div class="form-group">
              <label class="form-label" for="group-end-time-offset" translate="south.groups.end-time-offset"></label>
              <div class="input-group">
                <input
                  formControlName="endTimeOffset"
                  id="group-end-time-offset"
                  type="number"
                  class="form-control"
                  min="-2147483648"
                  max="2147483647"
                />
                <span class="input-group-text" translate="common.unit.ms"></span>
              </div>
              <val-errors controlName="endTimeOffset" />
            </div>
          </div>
        </div>
      }

      <!-- Recovery Strategy (only for historian connectors) -->
      @if (hasHistorianCapabilities) {
        <div class="form-group">
          <label class="form-label" for="group-recovery-strategy" translate="south.groups.recovery-strategy"></label>
          <select class="form-select" id="group-recovery-strategy" formControlName="recoveryStrategy">
            @for (strategy of recoveryStrategies; track strategy.value) {
              <option [value]="strategy.value" [translate]="strategy.labelKey"></option>
            }
          </select>
        </div>
      }
    </form>
  </div>
}
<div class="modal-footer">
  <div class="btn-group">
    <button
      [oib-save-button]="state"
      form="group-form"
      [translationKey]="directSave ? 'common.save' : 'common.ok'"
      [iconClass]="directSave ? 'fa-save' : 'fa-check'"
    ></button>
    <button type="button" class="btn btn-cancel" (click)="cancel()" translate="common.cancel" id="cancel-button"></button>
  </div>
</div>
