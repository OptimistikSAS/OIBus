<div class="manifest-builder">
  <form [formGroup]="form">
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <div class="form-label">&nbsp;</div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" formControlName="visible" id="manifest-visible" />
            <label
              class="form-check-label"
              for="manifest-visible"
              translate="configuration.oibus.manifest.transformers.manifest-builder.visible"
            ></label>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-group">
          <div class="form-label">&nbsp;</div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" formControlName="wrapInBox" id="manifest-wrap-in-box" />
            <label
              class="form-check-label"
              for="manifest-wrap-in-box"
              translate="configuration.oibus.manifest.transformers.manifest-builder.wrap-in-box"
            ></label>
          </div>
        </div>
      </div>
    </div>

    <oib-manifest-attributes-array
      [scanModes]="[]"
      [certificates]="[]"
      [parentGroup]="form"
      [control]="attributesControl"
      [arrayAttribute]="arrayAttribute"
    />
  </form>
</div>
