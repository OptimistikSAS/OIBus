<div [formGroup]="internalForm">
  <div class="row">
    <div class="col-12 mb-2">
      <div class="d-flex align-items-center flex-wrap column-gap-2">
        <label class="form-label mb-0" translate="date-range.range-type"></label>
        @if (internalForm.controls.rangeType.value !== 'custom') {
          <small class="text-muted range-summary"><i class="fa fa-clock-o me-1"></i>{{ getCurrentRangeDescription() }}</small>
        }
      </div>
      <select formControlName="rangeType" class="form-select" id="range-type-select">
        @for (range of predefinedRanges; track range.key) {
          <option [value]="range.key">
            {{ range.translationKey | translate }}
          </option>
        }
        <option value="custom">
          {{ 'date-range.custom' | translate }}
        </option>
      </select>
      <val-errors controlName="rangeType" />
    </div>
  </div>

  @if (internalForm.controls.rangeType.value === 'custom') {
    <div class="border rounded p-3">
      <div class="d-flex">
        <div class="flex-grow-1">
          <oib-datetimepicker formControlName="startTime" [label]="startLabel" />
          <val-errors controlName="startTime" />
        </div>
        <!-- Wrapper skips past the label row, then centers the icon inside exactly one form-control height -->
        <div style="align-self: start; padding-top: 1.75rem; height: calc(1.5em + 0.75rem + 2px); display: flex; align-items: center">
          <i class="fa fa-arrow-right oib-fa-arrow"></i>
        </div>
        <div class="flex-grow-1">
          <oib-datetimepicker formControlName="endTime" [label]="endLabel" />
          <val-errors controlName="endTime" />
        </div>
      </div>
    </div>
  }
</div>
