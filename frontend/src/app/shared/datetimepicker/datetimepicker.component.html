<div class="d-flex" [class.align-items-start]="label()">
  <div class="me-2 flex-grow-1">
    @if (label()) {
      <label class="form-label mb-1" [translate]="label()"></label>
    }
    <ng-template [ngTemplateOutlet]="dateTemplate() || defaultDateTemplate" [ngTemplateOutletContext]="{ $implicit: dateCtrl }" />
  </div>
  <div>
    <ng-template [ngTemplateOutlet]="timeTemplate() || defaultTimeTemplate" [ngTemplateOutletContext]="{ $implicit: timeCtrl }" />
  </div>
</div>
<ng-template #defaultDateTemplate let-formControl>
  <oib-datepicker-container #container>
    <input
      [formControl]="formControl"
      class="form-control"
      ngbDatepicker
      container="body"
      placement="bottom-end"
      [positionTarget]="container.toggleButton().nativeElement"
    />
  </oib-datepicker-container>
</ng-template>
<ng-template #defaultTimeTemplate let-formControl>
  <ngb-timepicker [seconds]="displaySeconds()" [formControl]="formControl" />
</ng-template>
