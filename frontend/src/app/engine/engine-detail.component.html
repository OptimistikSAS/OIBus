@if (engineSettings(); as settings) {
  <div class="oib-padded-container">
    <div class="row justify-content-center mb-2">
      <div class="col-md-10 col-lg-8">
        <div class="oib-header-container d-flex align-items-center justify-content-between">
          <div class="d-flex">
            <div class="oib-block-title">
              <img class="oib-title-image pt-2" src="/home/engine.svg" alt="logo" />
            </div>
            <h1 class="oib-title" translate="engine.title"></h1>
          </div>
          <div>
            <a class="btn btn-primary me-2" id="oianalytics-module" routerLink="oianalytics">
              <span class="fa fa-gear me-1" role="status" aria-hidden="true"></span>
              <span translate="engine.oianalytics"></span>
            </a>
            <button (click)="restart()" type="button" [disabled]="restarting.isPending | async" class="btn btn-danger" id="restart">
              @if (restarting.isPending | async) {
                <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
              }
              @if ((restarting.isPending | async) === false) {
                <span class="fa fa-rotate-right me-1" role="status" aria-hidden="true"></span>
              }
              <span translate="engine.restart"></span>
            </button>
          </div>
        </div>
        <!-- Engine metrics -->
        @if (metrics()) {
          <oib-engine-metrics [metrics]="metrics()!" />
        }

        <!-- General Settings -->
        <oib-box>
          <ng-template oibBoxTitle>
            <div class="d-flex align-items-center justify-content-between">
              <span translate="engine.general-settings.title"></span>
              <button
                type="button"
                class="btn btn-sm btn-primary"
                id="edit-name-button"
                (click)="openNameModal()"
                [ngbTooltip]="'engine.tooltips.edit' | translate"
              >
                <i class="fa fa-pencil"></i>
              </button>
            </div>
          </ng-template>
          <table class="table table-sm table-hover oib-table mb-3">
            <tbody>
              <tr>
                <td class="first-column-body" translate="engine.general-settings.name"></td>
                <td class="last-column-body">{{ settings.name }}</td>
              </tr>
            </tbody>
          </table>
        </oib-box>

        <!-- Web Server Settings -->
        <oib-box class="mt-2 d-block">
          <ng-template oibBoxTitle>
            <div class="d-flex align-items-center justify-content-between">
              <span translate="engine.web-server-settings.title"></span>
              <button
                type="button"
                class="btn btn-sm btn-primary"
                id="edit-web-server-button"
                (click)="openWebServerModal()"
                [ngbTooltip]="'engine.tooltips.edit' | translate"
              >
                <i class="fa fa-pencil"></i>
              </button>
            </div>
          </ng-template>
          <table class="table table-sm table-hover oib-table mb-3">
            <tbody>
              <tr>
                <td class="first-column-body" translate="engine.general-settings.port"></td>
                <td class="last-column-body">{{ settings.port }}</td>
              </tr>
            </tbody>
          </table>
        </oib-box>

        <!-- Proxy Settings -->
        <oib-box class="mt-2 d-block">
          <ng-template oibBoxTitle>
            <div class="d-flex align-items-center justify-content-between">
              <span translate="engine.proxy-settings.title"></span>
              <button
                type="button"
                class="btn btn-sm btn-primary"
                id="edit-proxy-button"
                (click)="openProxyModal()"
                [ngbTooltip]="'engine.tooltips.edit' | translate"
              >
                <i class="fa fa-pencil"></i>
              </button>
            </div>
          </ng-template>
          <table class="table table-sm table-hover oib-table mb-3">
            <tbody>
              <tr>
                <td class="first-column-body" translate="engine.proxy-settings.title"></td>
                @if (settings.proxyEnabled) {
                  <td
                    class="last-column-body"
                    translate="engine.proxy-settings.enabled-details"
                    [translateParams]="{ port: settings.proxyPort }"
                  ></td>
                } @else {
                  <td class="last-column-body" translate="engine.proxy-settings.disabled-details"></td>
                }
              </tr>
            </tbody>
          </table>
        </oib-box>

        <!-- Logger Settings -->
        <oib-box class="mt-2 d-block">
          <ng-template oibBoxTitle>
            <div class="d-flex align-items-center justify-content-between">
              <span translate="engine.logger.title"></span>
              <button
                type="button"
                class="btn btn-sm btn-primary"
                id="edit-logger-button"
                (click)="openLoggerModal()"
                [ngbTooltip]="'engine.tooltips.edit' | translate"
              >
                <i class="fa fa-pencil"></i>
              </button>
            </div>
          </ng-template>
          <table class="table table-sm table-hover oib-table mb-3">
            <tbody>
              <tr>
                <td class="first-column-body" translate="engine.general-settings.log-levels"></td>
                <td class="last-column-body">
                  <span
                    translate="engine.general-settings.console"
                    [translateParams]="{ level: settings.logParameters.console.level }"
                  ></span>
                  <span class="mx-1">|</span>
                  <span translate="engine.general-settings.file" [translateParams]="{ level: settings.logParameters.file.level }"></span>
                  <span class="mx-1">|</span>
                  <span
                    translate="engine.general-settings.database"
                    [translateParams]="{ level: settings.logParameters.database.level }"
                  ></span>
                  <span class="mx-1">|</span>
                  <span translate="engine.general-settings.loki" [translateParams]="{ level: settings.logParameters.loki.level }"></span>
                  <span class="mx-1">|</span>
                  <span translate="engine.general-settings.oia" [translateParams]="{ level: settings.logParameters.oia.level }"></span>
                </td>
              </tr>
            </tbody>
          </table>
        </oib-box>

        <oib-scan-mode-list />
        <div class="mt-2">
          <oib-ip-filter-list />
        </div>
        <div class="mt-2">
          <oib-certificate-list />
        </div>
        <div class="mt-2">
          <oib-transformer-list />
        </div>
      </div>
    </div>
  </div>
}
